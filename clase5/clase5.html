## ¿Qué necesito para analizar una encuesta?

.pull-left[
### 1. Una base de datos
- El archivo con las respuestas de los encuestados
- Puede estar en distintos formatos: `.csv`, `.xlsx`, `.sav`, `.dta`, `.RData`
- **Regla de oro:** una fila = una persona, una columna = una variable

### 2. Un libro de códigos
- El "diccionario" de tu base de datos
- Explica qué significa cada variable y sus valores
- Sin él, los números no tienen sentido
]

.pull-right[
###  3. Un plan de análisis
- ¿Qué quiero investigar o responder?
- ¿Qué variables necesito para eso?
- ¿Qué tipo de variables son? → ¿Qué análisis puedo hacer?

## La base de datos: cómo leerla

.left-column[
### Formatos comunes
- `.csv` ← universal
- `.xlsx` ← Excel
- `.sav` ← SPSS
- `.dta` ← STATA
- `.RData` ← R

&lt;br&gt;
**JASP lee todos estos formatos**

&lt;tr&gt;&lt;td class="row-label"&gt;2&lt;/td&gt;&lt;td&gt;52&lt;/td&gt;&lt;td&gt;1&lt;/td&gt;&lt;td&gt;1&lt;/td&gt;&lt;td&gt;2&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td class="row-label"&gt;3&lt;/td&gt;&lt;td&gt;28&lt;/td&gt;&lt;td&gt;2&lt;/td&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;1&lt;/td&gt;&lt;/tr&gt;

- `.csv` es el formato más **universal e interoperable** entre programas

### El libro de códigos: el diccionario de tus datos

.pull-left[
#### ¿Qué es?
Un documento que describe **cada variable** de la base de datos:
- Nombre de la variable (como aparece en la base)
- La pregunta original del cuestionario
- Los valores posibles y su significado
- El tipo de variable

#### ¿Por qué importa?
Sin él, el valor `2` en la columna `p2_sexo` podría significar cualquier cosa. El libro de códigos te dice que `1 = Hombre` y `2 = Mujer`.
]

.pull-right[
#### Ejemplo de libro de códigos

## Tener un plan: saber qué quiero investigar

.pull-left[
### Paso 1: Define tu pregunta
¿Qué quiero saber? Ejemplo:
&gt; *"¿Los jóvenes confían menos en el gobierno que los adultos mayores?"*

### Paso 2: Identifica tus variables
- **Variable dependiente:** `p3_confianza_gob`
- **Variable independiente:** `p1_edad` (o tramo etario)

]

.pull-right[
### Paso 3: ¿Qué tipo de variables son?
&lt;style type="text/css"&gt;
.type-table {
  font-size: 0.78em;
  border-collapse: collapse;
  width: 100%;
}
.type-table th {
  background-color: #085e9f;
  color: white;
  padding: 5px 8px;
}
.type-table td {
  padding: 4px 8px;
  border: 1px solid #ddd;
}
&lt;/style&gt;

&lt;table class="type-table"&gt;
&lt;thead&gt;
&lt;tr&gt;&lt;th&gt;Tipo&lt;/th&gt;&lt;th&gt;Descripción&lt;/th&gt;&lt;th&gt;Ejemplo&lt;/th&gt;&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;&lt;td&gt;&lt;b&gt;Nominal&lt;/b&gt;&lt;/td&gt;&lt;td&gt;Categorías sin orden&lt;/td&gt;&lt;td&gt;Sexo, región&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;b&gt;Ordinal&lt;/b&gt;&lt;/td&gt;&lt;td&gt;Categorías con orden&lt;/td&gt;&lt;td&gt;Escala Likert&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;b&gt;Continua&lt;/b&gt;&lt;/td&gt;&lt;td&gt;Valores numéricos&lt;/td&gt;&lt;td&gt;Edad, ingreso&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;

]

### Paso 4: ¿Qué análisis puedo hacer?
&lt;style type="text/css"&gt;
.analysis-box {
  font-size: 0.78em;
  background: #f8f8f8;
  border-left: 4px solid #b01333;
  padding: 8px 12px;
  margin-bottom: 8px;
  border-radius: 3px;
}
&lt;/style&gt;

&lt;div class="analysis-box"&gt;
&lt;b&gt;Variable nominal/ordinal →&lt;/b&gt;&lt;br&gt;
Frecuencias, porcentajes, moda, tablas cruzadas
&lt;/div&gt;

&lt;div class="analysis-box"&gt;
&lt;b&gt;Variable continua →&lt;/b&gt;&lt;br&gt;
Media, mediana, desviación estándar, histogramas
&lt;/div&gt;

&lt;div class="analysis-box"&gt;
&lt;b&gt;Nominal × Continua →&lt;/b&gt;&lt;br&gt;
Comparación de medias (t-test, ANOVA)
&lt;/div&gt;

&lt;div class="analysis-box"&gt;
&lt;b&gt;Ordinal × Ordinal →&lt;/b&gt;&lt;br&gt;
Correlación de Spearman, tablas cruzadas
&lt;/div&gt;

&lt;br&gt;
&gt; 🎯 El tipo de variable **determina** el análisis posible. Elegir mal el análisis produce resultados inválidos.
